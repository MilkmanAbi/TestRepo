app_name        = ytcui
display_name    = ytcui — YouTube Terminal UI
binary          = ytcui
install_path    = /usr/local/bin

version_url     = https://raw.githubusercontent.com/MilkmanAbi/TestRepo/main/VERSION
github          = MilkmanAbi/TestRepo
update_mode     = ask
require_sudo    = auto
additional_info = A terminal YouTube client. Browse, search and play YouTube without a browser.

desktop_category = AudioVideo
desktop_comment  = Browse and play YouTube from your terminal

[build]
system     = make
binary_out = ytcui

[deps]
ncurses.apt    = libncursesw5-dev
ncurses.pacman = ncurses
ncurses.dnf    = ncurses-devel
ncurses.zypper = ncurses-devel
ncurses.apk    = ncurses-dev
ncurses.emerge = sys-libs/ncurses
ncurses.xbps   = ncurses-devel
ncurses.brew   = ncurses
ncurses.pkg    = ncurses
ncurses.cmd    = ncurses-config

mpv.apt    = mpv
mpv.pacman = mpv
mpv.dnf    = mpv
mpv.zypper = mpv
mpv.apk    = mpv
mpv.emerge = media-video/mpv
mpv.xbps   = mpv
mpv.brew   = mpv
mpv.pkg    = mpv
mpv.cmd    = mpv

curl.apt    = curl
curl.pacman = curl
curl.dnf    = curl
curl.brew   = curl
curl.pkg    = curl
curl.cmd    = curl

git.apt    = git
git.pacman = git
git.dnf    = git
git.brew   = git
git.pkg    = git
git.cmd    = git

[deps.optional]
chafa.apt    = chafa
chafa.pacman = chafa
chafa.dnf    = chafa
chafa.brew   = chafa
chafa.pkg    = chafa
chafa.cmd    = chafa
chafa.desc   = terminal image preview (thumbnails)
