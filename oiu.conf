# oiu.conf for ytcui
# Update github_repo and version_file to point to YOUR repo before testing
app_name        = ytcui
display_name    = ytcui — YouTube Terminal UI
binary          = ytcui
install_path    = /usr/local/bin

version_file    = https://raw.githubusercontent.com/MilkmanAbi/TestRepo/main/VERSION
github_repo     = MilkmanAbi/TestRepo

update_mode     = notify
update_channel  = stable
require_sudo    = auto
user_install_fallback = true

desktop_category = AudioVideo
desktop_comment  = Browse and play YouTube from your terminal

[deps]
ncurses.apt      = libncursesw5-dev
ncurses.pacman   = ncurses
ncurses.dnf      = ncurses-devel
ncurses.zypper   = ncurses-devel
ncurses.apk      = ncurses-dev
ncurses.emerge   = sys-libs/ncurses
ncurses.xbps     = ncurses-devel
ncurses.brew     = ncurses
ncurses.pkg      = ncurses
ncurses.command  = ncurses-config

mpv.apt          = mpv
mpv.pacman       = mpv
mpv.dnf          = mpv
mpv.zypper       = mpv
mpv.apk          = mpv
mpv.emerge       = media-video/mpv
mpv.xbps         = mpv
mpv.brew         = mpv
mpv.pkg          = mpv
mpv.command      = mpv

curl.apt         = curl
curl.pacman      = curl
curl.dnf         = curl
curl.brew        = curl
curl.pkg         = curl
curl.command     = curl

git.apt          = git
git.pacman       = git
git.dnf          = git
git.brew         = git
git.pkg          = git
git.command      = git

[deps.optional]
chafa.apt         = chafa
chafa.pacman      = chafa
chafa.dnf         = chafa
chafa.brew        = chafa
chafa.pkg         = chafa
chafa.command     = chafa
chafa.description = Terminal image preview (video thumbnails)
